services:
  postgres:
    image: postgres:18
    container_name: lojacelular-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lojacelular}
      POSTGRES_USER: ${POSTGRES_USER:-lojacelular}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lojacelular}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres18_data:/var/lib/postgresql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-lojacelular} -d ${POSTGRES_DB:-lojacelular}"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres18_data:
